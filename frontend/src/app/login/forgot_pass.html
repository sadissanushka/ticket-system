<!-- Page Description: Initiates the password reset flow. Takes the user's email/ID, requests an OTP from the backend, and redirects to the OTP verification page. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md text-center">

        <h2 class="text-2xl font-bold mb-2">Forgot Password</h2>
        <p class="text-gray-500 mb-6">Enter your university email or student ID to receive an OTP.</p>

        <div class="mb-4 text-left">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="email">University Email or ID</label>
            <input id="email" type="text" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="e.g. 123456A or jdoe.12@uom.lk">
        </div>

        <p id="errorMsg" class="text-red-500 text-sm mb-3 hidden text-left"></p>

        <button id="sendBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition" onclick="requestOTP()">
            Send OTP
        </button>

        <div class="mt-4 text-sm text-gray-600">
            Remember your password? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Sign in</a>
        </div>

    </div>

    <script>
        const CONFIG = {
            REQUEST_OTP_API: "/api/auth/request-otp",
            REDIRECT_AFTER_SUCCESS: "otp_verify.html"
        };

        async function requestOTP() {
            const emailInput = document.getElementById("email").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const sendBtn = document.getElementById("sendBtn");

            const emailRegex = /^[a-zA-Z]+\.\d{2}@uom\.lk$/;
            const studentIdRegex = /^\d{6}[A-Z]$/;

            if (!emailRegex.test(emailInput) && !studentIdRegex.test(emailInput)) {
                errorMsg.textContent = "Please enter a valid Student ID (e.g., 123456A) or University Email (e.g., jdoe.12@uom.lk)";
                errorMsg.classList.remove("hidden");
                return;
            }

            errorMsg.classList.add("hidden");
            sendBtn.disabled = true;
            sendBtn.innerText = "Sending...";

            try {
                // Send request OTP data to backend
                const response = await fetch(CONFIG.REQUEST_OTP_API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ identifier: emailInput })
                });

                if (response.ok) {
                    // IMPORTANT: otp_verify.html expects "resetEmail" to be in localStorage
                    localStorage.setItem("resetEmail", emailInput);
                    alert("OTP sent to your email!");
                    window.location.href = CONFIG.REDIRECT_AFTER_SUCCESS;
                } else {
                    let errorMessage = "Failed to send OTP. Please try again.";
                    try {
                        const data = await response.json();
                        if (data.message) errorMessage = data.message;
                    } catch (e) {}
                    errorMsg.textContent = errorMessage;
                    errorMsg.classList.remove("hidden");
                }
            } catch (err) {
                errorMsg.textContent = "Network error. Please try again later.";
                errorMsg.classList.remove("hidden");
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "Send OTP";
            }
        }
    </script>

</body>

</html>
