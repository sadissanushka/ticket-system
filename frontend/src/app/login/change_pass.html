<!-- Page Description: Final step of the password reset flow. Accepts and validates a new password, and redirects to the login screen upon successful reset. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2563EB",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>
</head>

<body class="font-display bg-background-light dark:bg-background-dark 
             text-slate-900 dark:text-slate-100 
             min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Card -->
    <div class="w-full max-w-md bg-white dark:bg-slate-800 
              rounded-2xl shadow-lg p-6 space-y-6">

        <!-- Title -->
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-semibold">Reset your password</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">
                Enter a new password for your account
            </p>
        </div>

        <!-- Form -->
        <form id="resetForm" class="space-y-4">

            <!-- Password -->
            <div class="space-y-1">
                <label class="text-sm">New Password</label>

                <div class="relative mt-1">
                    <input id="password" type="password" class="w-full px-4 py-3 border rounded-lg border-slate-300 dark:border-slate-600 bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-600 pr-10" placeholder="Enter new password" required>

                    <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" onclick="togglePasswordVisibility('password', 'eyeIconPassword')">
                        <span id="eyeIconPassword" class="material-symbols-outlined text-xl">visibility_off</span>
                    </button>
                </div>

                <!-- Strength -->
                <div class="h-2 bg-slate-200 dark:bg-slate-700 rounded mt-2">
                    <div id="strengthBar" class="h-2 rounded w-0"></div>
                </div>
                <p id="strengthText" class="text-xs mt-1"></p>
            </div>

            <!-- Confirm -->
            <div class="space-y-1">
                <label class="text-sm">Confirm Password</label>

                <div class="relative mt-1">
                    <input id="confirmPassword" type="password" class="w-full px-4 py-3 border rounded-lg border-slate-300 dark:border-slate-600 bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-600 pr-10" placeholder="Confirm password" required>

                    <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" onclick="togglePasswordVisibility('confirmPassword', 'eyeIconConfirmPassword')">
                        <span id="eyeIconConfirmPassword" class="material-symbols-outlined text-xl">visibility_off</span>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <p id="errorMsg" class="text-red-500 text-sm hidden"></p>
            <p id="successMsg" class="text-green-500 text-sm hidden"></p>

            <!-- Button -->
            <button class="w-full bg-blue-600 hover:bg-blue-700 
                     text-white py-3 rounded-lg font-medium transition">
                Reset Password
            </button>

        </form>

    </div>

    <script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility";
            } else {
                input.type = "password";
                icon.textContent = "visibility_off";
            }
        }

        // Strength
        const passwordInput = document.getElementById("password");
        const bar = document.getElementById("strengthBar");
        const text = document.getElementById("strengthText");

        passwordInput.addEventListener("input", () => {
            const val = passwordInput.value;
            let strength = 0;

            if (val.length > 6) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[@$!%*?&]/.test(val)) strength++;

            const colors = ["bg-red-500", "bg-yellow-500", "bg-blue-500", "bg-green-500"];
            const labels = ["Weak", "Medium", "Strong", "Very Strong"];

            if (!val) {
                bar.style.width = "0%";
                text.textContent = "";
                return;
            }

            bar.style.width = strength * 25 + "%";
            bar.className = "h-2 rounded " + colors[strength - 1];
            text.textContent = labels[strength - 1];
        });

        // Submit
        document.getElementById("resetForm").addEventListener("submit", async e => {
            e.preventDefault();

            const pass = passwordInput.value;
            const confirm = document.getElementById("confirmPassword").value;
            const error = document.getElementById("errorMsg");
            const successMsg = document.getElementById("successMsg");
            const submitBtn = document.querySelector("#resetForm button");
            
            // Assume email and otp validation state from previous steps
            const email = localStorage.getItem("resetEmail");

            error.classList.add("hidden");
            successMsg.classList.add("hidden");

            if (!email) {
                error.textContent = "Session expired. Please restart the forgot password process.";
                error.classList.remove("hidden");
                return;
            }

            if (pass !== confirm) {
                error.textContent = "Passwords do not match";
                error.classList.remove("hidden");
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Resetting...";

            try {
                const response = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, newPassword: pass })
                });

                if (response.ok) {
                    successMsg.textContent = "Password reset successfully! Redirecting to login...";
                    successMsg.classList.remove("hidden");
                    localStorage.removeItem("resetEmail");
                    localStorage.removeItem("otpVerified");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    let errorMessage = "Failed to reset password. Please try again.";
                    try {
                        const data = await response.json();
                        if (data.message) errorMessage = data.message;
                    } catch (err) {}
                    error.textContent = errorMessage;
                    error.classList.remove("hidden");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Reset Password";
                }
            } catch (err) {
                error.textContent = "Network error. Please try again later.";
                error.classList.remove("hidden");
                submitBtn.disabled = false;
                submitBtn.innerText = "Reset Password";
            }
        });
    </script>

</body>

</html>
